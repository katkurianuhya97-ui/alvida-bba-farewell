<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ALVIDA - BBA (REG) 2023-2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #fce3ec, #ffe8d6);
            text-align: center;
            color: #333;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 3px;
        }

        h2 {
            font-weight: 400;
        }

        .details {
            margin: 30px 0;
            font-size: 18px;
        }

        .countdown {
            font-size: 28px;
            margin: 30px 0;
            font-weight: bold;
        }

        .rsvp-form {
            background: white;
            padding: 30px;
            max-width: 400px;
            margin: 40px auto;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #ff8fab;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #fb6f92;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>ALVIDA</h1>
    <h2>BBA (REG) 2023 – 2026</h2>
</header>

<div class="details">
    <p><strong>Date:</strong> 4th April 2026 (Sunday)</p>
    <p><strong>Venue:</strong> JNTU UCMH Auditorium</p>
    <p><strong>Time:</strong> 10:00 AM onwards</p>
</div>

<div class="countdown" id="countdown">
    Farewell Begins In: Loading...
</div>

<div class="rsvp-form">
    <h3>Confirm Your Attendance</h3>

    <form>
        <input type="text" placeholder="Student Name" required>
        <input type="text" placeholder="Roll Number" required>
        <input type="tel" placeholder="Phone Number" required>

        <select required>
            <option value="">Will You Attend?</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit">Submit</button>
    </form>
</div>

<footer>
    Made with ❤️ for BBA (REG) 2023–2026
</footer>

<script>
    const eventDate = new Date("April 4, 2026 10:00:00").getTime();

    const countdownFunction = setInterval(function() {
        const now = new Date().getTime();
        const distance = eventDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
            "Farewell Begins In: " + days + "d " + hours + "h "
            + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(countdownFunction);
            document.getElementById("countdown").innerHTML = "The Celebration Has Begun 🎉";
        }
    }, 1000);
</script>

</body>
</html>
